name: Atualiza métricas de produtividade

on:
  schedule:
    - cron: '0 3 * * 0' # Domingo 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      - name: Generate metrics.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/collect_productivity_metrics.py

      - name: Commit & push metrics.json
        run: |
          set -e
          git status
          if git diff --quiet -- docs/productivity/metrics.json; then
            echo "No changes in docs/productivity/metrics.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/productivity/metrics.json
          git commit -m "[bot] Atualiza métricas de produtividade"
          git push

