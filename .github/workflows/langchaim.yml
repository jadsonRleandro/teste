name: executor langchaim

on:
  workflow_dispatch: # Permite o acionamento manual.
  workflow_run:
    workflows: ["executor scraper"]
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar LangChain e dependências
        run: |
          pip install langchain
          pip install python-dotenv
          langchain-google-genai

      - name: Executar LangChain
        run: python backend/llm/langChain_Controller.py

      - name: LangChain executado, atualizando o repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add backend/llm/

          echo "Git status after add:" 
          git status --porcelain

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[bot] Scraper executado, atualizando o repositório" 
          echo "Committed. Pushing..."

          git push origin HEAD:${{ github.ref_name }}
