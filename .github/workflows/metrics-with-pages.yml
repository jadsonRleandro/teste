
name: metrics-with-pages

on:
    workflow_dispatch:
    push:
      branches:
        - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalando MkDocs
        run: |
          pip install mkdocs mkdocs-material
          python -m pip install --upgrade pip
          pip install -r docs/productivity/requirements.txt

      - name: Coletor de métricas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "Running collector..."
          python docs/productivity/collect_metrics.py
          echo "Collector finished. File stats:" 
          ls -lah docs/productivity/metrics.json || true
          echo "First bytes:" 
          (head -c 400 docs/productivity/metrics.json || true)

      - name: Commit updated metrics
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/productivity/metrics.json

          echo "Git status after add:" 
          git status --porcelain

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[bot] Métricas atualizadas" 
          echo "Committed. Pushing..."

          git push origin HEAD:${{ github.ref_name }}

      - name: Buildando site
        run: |
          mkdocs build

      - name: Dando upload em artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Implementando GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4