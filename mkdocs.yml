repo_name: VeritasIA
site_name: VeritasIA
repo_url: https://github.com/danilofns/VeritasIA
site_description: "Documentação oficial do VeritasIA"
docs_dir: docs

theme: 
  name: material
  logo: assets/texto.png
  favicon: assets/Logo.png
  custom_dir: overrides
  language: pt-BR

  features:
    - navigation.tabs
    
  palette:
    primary: custom
    accent: custom

nav:
  - Home: 
      - index.md

  - Arquitetura:
      - projeto/Arquitetura.md

  - Requisitos:
      - projeto/Requisitos.md

  - Organização:
      - Sprint 1: projeto/sprint1.md
      - Sprint 2: projeto/sprint2.md
      - Sprint 3: projeto/sprint3.md
      - Sprint 4: projeto/sprint4.md
    
  - Frontend:
      - React: frontend/React.md
      - Prototipagem: frontend/Prototipagem.md

  - Backend:
      - FastAPI: backend/FastAPI.md
      - Web Scraping: backend/Scrapy.md
      - LangChain: backend/LangChain.md

  - Participantes:
        - sobre-nos.md

  - DashBoard:
      - Produtividade: dashboard/dashboard.md


site_dir: site

extra_css:
  - stylesheets/extra.css

plugins:
  - search